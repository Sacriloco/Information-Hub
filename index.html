<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information HQ - Analist Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        'bento': '0 8px 30px rgba(0, 0, 0, 0.04)',
                        'bento-hover': '0 10px 40px rgba(0, 0, 0, 0.08)',
                        'bento-modal': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
                    },
                    borderRadius: { '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .feed-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-active { border-bottom: 2px solid #2563EB; color: #111827; font-weight: bold; }
        .tab-inactive { color: #6B7280; }
        .prose p { margin-bottom: 0.75em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; }
    </style>
</head>
<body class="bg-[#F4F5F7] text-[#1A1A1A] font-sans antialiased selection:bg-blue-200">
    <div class="max-w-[90rem] mx-auto p-4 lg:p-10">
        <!-- Header -->
        <header class="bg-white rounded-4xl p-6 lg:p-8 shadow-bento mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 border border-gray-100">
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase italic text-gray-900">Information HQ</h1>
                <div class="flex items-center gap-3 mt-1">
                    <p id="current-date" class="text-sm text-gray-500 font-medium"></p>
                    <span id="cache-status" class="text-[9px] uppercase tracking-widest font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-400"></span>
                </div>
            </div>
            
            <div class="w-full lg:w-auto flex flex-col md:flex-row gap-4">
                <input type="text" id="search-input" placeholder="Filter content..." class="w-full md:w-80 pl-6 pr-4 py-3 rounded-2xl bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium border-none shadow-inner">
                <div class="flex gap-2">
                    <div class="bg-gray-100 p-1 rounded-2xl flex">
                        <button onclick="setViewMode('live')" id="btn-mode-live" class="px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-white shadow-sm">Live Feed</button>
                        <button onclick="setViewMode('vault')" id="btn-mode-vault" class="px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all text-gray-500">Vault 🔖</button>
                    </div>
                    <button onclick="toggleConfigModal()" class="p-3 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50 transition text-gray-400" title="Instellingen">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Main Content -->
            <div class="lg:col-span-3 flex flex-col gap-6">
                <!-- Filters Control Center -->
                <div class="bg-white rounded-3xl p-6 shadow-bento border border-gray-100 flex flex-col gap-4">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 w-20">Signaal</span>
                        <div class="flex bg-gray-50 p-1 rounded-xl">
                            <button onclick="setTier('Alle')" id="btn-tier-Alle" class="px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all bg-white shadow-sm border border-gray-200">Mix</button>
                            <button onclick="setTier('2')" id="btn-tier-2" class="px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-gray-500">⚡ Wire</button>
                            <button onclick="setTier('1')" id="btn-tier-1" class="px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-gray-500">📖 Deep Dive</button>
                            <button onclick="setTier('3')" id="btn-tier-3" class="px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-gray-500">✉️ Substack</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 border-t border-gray-50 pt-4">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 w-20">Domein</span>
                        <div id="category-filters" class="flex flex-nowrap gap-2 overflow-x-auto hide-scrollbar pb-1 w-full"></div>
                    </div>
                </div>

                <div id="feed-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards via JS -->
                </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-6">
                <!-- Status & Vault -->
                <div class="bg-[#1A1A1A] text-white p-8 rounded-4xl shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                    <h3 class="text-[10px] font-bold uppercase tracking-widest mb-3 text-gray-400 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full" id="status-dot"></span>
                        <span id="status-text">HQ Actief</span>
                    </h3>
                    <p class="text-[11px] opacity-70 mb-4 font-medium">Lokaal beheer van gecureerde datastromen.</p>
                    <div class="text-[10px] uppercase font-bold text-gray-400 border-t border-gray-800 pt-4">
                        <span id="vault-count">0 items in Vault</span>
                    </div>
                </div>

                <!-- Aanbevolen Media (Contextueel) -->
                <div id="media-sidebar" class="bg-blue-600 text-white p-6 rounded-4xl shadow-bento hidden transition-all duration-500">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-80">🎧 Aanbevolen Media</h2>
                    <div id="media-list" class="space-y-4"></div>
                </div>

                <!-- Netwerk Index -->
                <div class="bg-white p-6 rounded-4xl shadow-bento border border-gray-100 flex flex-col max-h-[500px]">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4 border-b pb-3">Netwerk Index</h2>
                    <ul class="space-y-1 overflow-y-auto hide-scrollbar flex-1 pr-1" id="source-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Summary Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-4xl w-full max-w-2xl shadow-bento-modal overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-100 text-blue-600 rounded-xl">⚡</div>
                    <h3 class="font-bold text-gray-900" id="summary-source">Samenvatting</h3>
                </div>
                <button onclick="closeAIModal()" class="text-gray-400 hover:text-gray-900 p-2">✕</button>
            </div>
            <div class="p-8 overflow-y-auto prose text-sm text-gray-700 leading-relaxed" id="summary-content"></div>
            <div class="p-4 border-t bg-white text-right">
                <button onclick="closeAIModal()" class="px-6 py-2 bg-gray-100 text-gray-700 text-xs font-bold uppercase rounded-xl">Sluiten</button>
            </div>
        </div>
    </div>

    <!-- Config & Bronbeheer Modal -->
    <div id="config-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-4xl w-full max-w-2xl shadow-bento-modal overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <div class="flex gap-6">
                    <button onclick="switchConfigTab('sources')" id="tab-btn-sources" class="pb-2 tab-active text-sm">Bronbeheer</button>
                    <button onclick="switchConfigTab('ai')" id="tab-btn-ai" class="pb-2 tab-inactive text-sm">AI Engine</button>
                </div>
                <button onclick="toggleConfigModal()" class="text-gray-400 hover:text-gray-900">✕</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 bg-white">
                <div id="tab-content-sources">
                    <div class="bg-blue-50 p-6 rounded-3xl mb-8">
                        <h4 class="text-[10px] font-bold uppercase mb-4 text-blue-700 tracking-widest" id="form-title">Nieuwe Bron Toevoegen</h4>
                        <input type="hidden" id="edit-index" value="-1">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="new-feed-name" placeholder="Naam (bijv. The Verge)" class="p-3 rounded-xl border text-xs outline-none bg-white">
                            <input type="text" id="new-feed-cat" placeholder="Domein (bijv. Tech)" class="p-3 rounded-xl border text-xs outline-none bg-white">
                            <input type="url" id="new-feed-url" placeholder="RSS URL (https://...)" class="col-span-2 p-3 rounded-xl border text-xs outline-none bg-white">
                            <div class="col-span-2 flex gap-2 p-1 bg-gray-100 rounded-xl">
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg border bg-white cursor-pointer"><input type="radio" name="new-feed-tier" value="2" checked><span class="text-[10px] font-bold">⚡ Wire</span></label>
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg border bg-white cursor-pointer"><input type="radio" name="new-feed-tier" value="1"><span class="text-[10px] font-bold">📖 Deep Dive</span></label>
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg border bg-white cursor-pointer"><input type="radio" name="new-feed-tier" value="3"><span class="text-[10px] font-bold">✉️ Substack</span></label>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-4">
                            <button onclick="addOrUpdateFeed()" id="btn-save-feed" class="flex-1 py-3 bg-gray-900 text-white text-[10px] font-bold uppercase rounded-xl tracking-widest">Opslaan</button>
                            <button onclick="resetFeedForm()" id="btn-cancel-edit" class="hidden flex-1 py-3 bg-gray-200 text-gray-700 text-[10px] font-bold uppercase rounded-xl tracking-widest">Annuleren</button>
                        </div>
                    </div>
                    <h4 class="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest">Actieve Bronnen</h4>
                    <ul id="manage-source-list" class="space-y-2"></ul>
                </div>
                <div id="tab-content-ai" class="hidden space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2 tracking-widest">OpenAI API Key (sk-...)</label>
                        <input type="password" id="config-apikey" placeholder="Plak uw sleutel hier..." class="w-full p-4 rounded-xl border outline-none bg-gray-50">
                    </div>
                    <button onclick="saveAIConfig()" class="w-full py-3 bg-blue-600 text-white text-[10px] font-bold uppercase rounded-xl tracking-widest">Sleutel Opslaan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DEFAULT CONFIGURATION ---
        const DEFAULT_FEEDS = [
            { name: 'De Tijd', url: 'https://www.tijd.be/rss/politiek_belgie.xml', cat: 'België', tier: '2' },
            { name: 'VRT NWS', url: 'https://vrtnws.be/nl.rss.articles.xml', cat: 'België', tier: '2' },
            { name: 'Apache', url: 'https://www.apache.be/feed', cat: 'België', tier: '1' },
            { name: 'Reuters World', url: 'https://www.reutersagency.com/feed/?best-topics=world-news&post_type=best', cat: 'Wereld', tier: '2' },
            { name: 'Foreign Affairs', url: 'https://www.foreignaffairs.com/rss.xml', cat: 'Wereld', tier: '1' },
            { name: 'Sinocism', url: 'https://sinocism.com/feed', cat: 'Wereld', tier: '3' },
            { name: 'Adam Tooze', url: 'https://adamtooze.substack.com/feed', cat: 'Economie', tier: '3' },
            { name: 'The Economist', url: 'https://www.economist.com/finance-and-economics/rss.xml', cat: 'Economie', tier: '1' },
            { name: 'Stratechery', url: 'https://stratechery.com/feed/', cat: 'Tech', tier: '3' },
            { name: 'The Verge', url: 'https://www.theverge.com/rss/index.xml', cat: 'Tech', tier: '2' },
            { name: 'Quanta Magazine', url: 'https://www.quantamagazine.org/feed/', cat: 'Wetenschap', tier: '1' },
            { name: 'The Honest Broker', url: 'https://tedgioia.substack.com/feed', cat: 'Cultuur', tier: '3' }
        ];

        const RECOMMENDED_MEDIA = {
            'Wereld': [
                { name: 'The Red Line', type: 'Podcast', url: 'https://www.theredlinepodcast.com/' },
                { name: 'CaspianReport', type: 'YouTube', url: 'https://www.youtube.com/@CaspianReport' }
            ],
            'Economie': [
                { name: 'Odd Lots', type: 'Podcast', url: 'https://www.bloomberg.com/podcasts/odd_lots' },
                { name: 'Patrick Boyle', type: 'YouTube', url: 'https://www.youtube.com/@PatrickBoyle' }
            ],
            'België': [
                { name: 'De Afspraak op Vrijdag', type: 'Podcast', url: 'https://www.vrt.be/vrtmax/a-z/de-afspraak-op-vrijdag/' }
            ],
            'AI': [
                { name: 'Hard Fork', type: 'Podcast', url: 'https://www.nytimes.com/column/hard-fork' },
                { name: 'Two Minute Papers', type: 'YouTube', url: 'https://www.youtube.com/@TwoMinutePapers' }
            ]
        };

        // --- 2. GLOBAL STATE ---
        const FEEDS_KEY = "intel_hub_feeds_v3";
        const VAULT_KEY = "intel_hub_vault_v3";
        const CONFIG_KEY = "intel_hub_config_v3";
        const CACHE_KEY = "intel_hub_cache_v3";

        let userFeeds = JSON.parse(localStorage.getItem(FEEDS_KEY)) || DEFAULT_FEEDS;
        let vaultItems = JSON.parse(localStorage.getItem(VAULT_KEY)) || [];
        let appConfig = JSON.parse(localStorage.getItem(CONFIG_KEY)) || { apiKey: "" };
        let allItems = [];
        let activeCategory = 'Alle';
        let activeTier = 'Alle';
        let viewMode = 'live';

        // --- 3. DATA FETCHING ---
        async function loadFeeds(force = false) {
            const cached = localStorage.getItem(CACHE_KEY);
            if (!force && cached) {
                const parsed = JSON.parse(cached);
                if (Date.now() - parsed.timestamp < 30 * 60 * 1000) {
                    allItems = parsed.items;
                    renderAll(); return;
                }
            }

            document.getElementById('status-text').innerText = "HQ Status: Syncing...";
            document.getElementById('status-dot').classList.add('animate-pulse');
            allItems = [];

            const fetchPromises = userFeeds.map(async (feed) => {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        data.items.slice(0, 5).forEach(item => {
                            allItems.push({
                                id: item.link, 
                                title: item.title, 
                                link: item.link,
                                description: item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 180) + '...' : '',
                                fullText: item.content || item.description || '',
                                sourceName: feed.name, 
                                category: feed.cat, 
                                tier: feed.tier,
                                pubDate: item.pubDate, 
                                formattedDate: new Date(item.pubDate).toLocaleDateString('nl-BE')
                            });
                        });
                    }
                } catch (e) { console.warn("Mislukt:", feed.name); }
            });

            await Promise.allSettled(fetchPromises);
            allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
            localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), items: allItems }));
            
            document.getElementById('status-text').innerText = "HQ Status: Actief";
            document.getElementById('status-dot').classList.remove('animate-pulse');
            renderAll();
        }

        // --- 4. UI RENDERING ---
        function renderAll() {
            renderCategoryFilters();
            renderMediaSidebar();
            filterAndRender();
            renderManageSources();
            renderSourceList();
            updateVaultCount();
        }

        function renderCategoryFilters() {
            const cats = ['Alle', ...new Set(userFeeds.map(f => f.cat))];
            document.getElementById('category-filters').innerHTML = cats.map(cat => {
                const active = activeCategory === cat;
                return `<button onclick="activeCategory='${cat}'; renderAll()" class="px-4 py-1.5 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all whitespace-nowrap border ${active ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-gray-50'}">${cat}</button>`;
            }).join('');
        }

        function renderSourceList() {
            document.getElementById('source-list').innerHTML = userFeeds.map(f => `
                <li onclick="activeCategory='${f.cat}'; renderAll()" class="flex justify-between items-center p-2 hover:bg-gray-50 rounded-xl transition-all cursor-pointer group">
                    <span class="text-xs font-medium truncate group-hover:text-blue-600">${f.name}</span>
                    <span class="text-[8px] font-bold px-1.5 py-0.5 bg-gray-100 rounded uppercase text-gray-400">${f.cat}</span>
                </li>
            `).join('');
        }

        function renderMediaSidebar() {
            const sidebar = document.getElementById('media-sidebar');
            const list = document.getElementById('media-list');
            const media = RECOMMENDED_MEDIA[activeCategory];

            if (activeCategory !== 'Alle' && media) {
                sidebar.classList.remove('hidden');
                list.innerHTML = media.map(m => `
                    <a href="${m.url}" target="_blank" class="block p-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all">
                        <p class="text-[9px] font-black uppercase tracking-widest opacity-60 mb-1">${m.type}</p>
                        <p class="text-xs font-bold">${m.name}</p>
                    </a>
                `).join('');
            } else {
                sidebar.classList.add('hidden');
            }
        }

        function filterAndRender() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const sourceData = viewMode === 'live' ? allItems : vaultItems;
            
            const filtered = sourceData.filter(i => {
                const matchSearch = i.title.toLowerCase().includes(term) || i.description.toLowerCase().includes(term);
                const matchCat = activeCategory === 'Alle' || i.category === activeCategory;
                const matchTier = activeTier === 'Alle' || i.tier === activeTier;
                return matchSearch && matchCat && matchTier;
            });

            const container = document.getElementById('feed-content');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center bg-white rounded-4xl border border-dashed"><p class="text-gray-400 text-sm font-medium">Geen rapportages gevonden.</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(i => {
                const isVaulted = vaultItems.some(v => v.id === i.id);
                const tierIcon = i.tier === '1' ? '📖' : (i.tier === '3' ? '✉️' : '⚡');
                return `
                <div class="feed-card bg-white p-6 rounded-3xl border border-gray-100 shadow-bento hover:-translate-y-1 relative flex flex-col justify-between h-full">
                    <div>
                        <button onclick="toggleVault('${encodeURIComponent(JSON.stringify(i))}')" class="absolute top-6 right-6 ${isVaulted ? 'text-yellow-400' : 'text-gray-300'} hover:text-yellow-400 transition-colors text-xl">★</button>
                        <div class="mb-4 flex justify-between items-center pr-8">
                            <span class="text-[9px] font-black uppercase px-2 py-1 bg-gray-50 text-gray-600 rounded-lg border border-gray-100">${tierIcon} ${i.sourceName}</span>
                            <span class="text-[9px] text-gray-400 font-bold">${i.formattedDate}</span>
                        </div>
                        <h3 class="font-bold text-[1.05rem] leading-snug mb-2 text-gray-900">${i.title}</h3>
                        <p class="text-xs text-gray-500 line-clamp-3 mb-6 font-medium">${i.description}</p>
                    </div>
                    
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50">
                        <div class="flex gap-3">
                            <a href="${i.link}" target="_blank" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:text-blue-800">Lees</a>
                            <button onclick="generateSummary('${encodeURIComponent(JSON.stringify(i))}')" class="text-[10px] font-black text-purple-600 uppercase tracking-widest hover:text-purple-800">AI-Scan</button>
                        </div>
                        <a href="https://archive.is/latest/${encodeURIComponent(i.link)}" target="_blank" rel="noopener noreferrer" class="text-[9px] font-black text-gray-400 hover:text-red-500 uppercase tracking-widest flex items-center gap-1.5 bg-gray-50 px-2 py-1 rounded-md border border-transparent hover:border-red-100 transition-all">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                            Unlock
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        // --- 5. SOURCE & CONFIG MANAGEMENT ---
        function renderManageSources() {
            const list = document.getElementById('manage-source-list');
            list.innerHTML = userFeeds.map((f, i) => `
                <li class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-200">
                    <div>
                        <p class="text-xs font-bold text-gray-900">${f.name}</p>
                        <p class="text-[9px] text-gray-400 uppercase tracking-widest">${f.cat} • Tier ${f.tier}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editFeed(${i})" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors">✎</button>
                        <button onclick="deleteFeed(${i})" class="p-2 text-red-400 hover:bg-red-50 rounded-lg transition-colors">✕</button>
                    </div>
                </li>
            `).join('');
        }

        function editFeed(index) {
            const f = userFeeds[index];
            document.getElementById('new-feed-name').value = f.name;
            document.getElementById('new-feed-cat').value = f.cat;
            document.getElementById('new-feed-url').value = f.url;
            document.querySelector(`input[name="new-feed-tier"][value="${f.tier}"]`).checked = true;
            
            document.getElementById('edit-index').value = index;
            document.getElementById('form-title').innerText = "Bron Bewerken";
            document.getElementById('btn-save-feed').innerText = "Bijwerken";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
        }

        function resetFeedForm() {
            document.getElementById('edit-index').value = "-1";
            document.getElementById('new-feed-name').value = "";
            document.getElementById('new-feed-cat').value = "";
            document.getElementById('new-feed-url').value = "";
            document.getElementById('form-title').innerText = "Nieuwe Bron Toevoegen";
            document.getElementById('btn-save-feed').innerText = "Opslaan";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function addOrUpdateFeed() {
            const index = parseInt(document.getElementById('edit-index').value);
            const name = document.getElementById('new-feed-name').value.trim();
            const cat = document.getElementById('new-feed-cat').value.trim();
            const url = document.getElementById('new-feed-url').value.trim();
            const tier = document.querySelector('input[name="new-feed-tier"]:checked').value;

            if(!name || !cat || !url) return alert("Vul alle velden in.");

            const feedObj = { name, cat, url, tier };
            if (index === -1) userFeeds.push(feedObj);
            else userFeeds[index] = feedObj;

            localStorage.setItem(FEEDS_KEY, JSON.stringify(userFeeds));
            resetFeedForm();
            loadFeeds(true);
        }

        function deleteFeed(i) {
            if(confirm(`'${userFeeds[i].name}' verwijderen uit netwerk?`)) {
                userFeeds.splice(i, 1);
                localStorage.setItem(FEEDS_KEY, JSON.stringify(userFeeds));
                renderAll();
            }
        }

        function saveAIConfig() {
            appConfig.apiKey = document.getElementById('config-apikey').value.trim();
            localStorage.setItem(CONFIG_KEY, JSON.stringify(appConfig));
            alert("Sleutel opgeslagen.");
        }

        // --- 6. AI & UTILS ---
        async function generateSummary(encoded) {
            const i = JSON.parse(decodeURIComponent(encoded));
            if (!appConfig.apiKey) return alert("Vul eerst uw OpenAI API-key in bij instellingen.");

            const modal = document.getElementById('ai-modal');
            const summaryContent = document.getElementById('summary-content');
            document.getElementById('summary-source').innerText = i.sourceName;
            
            modal.classList.remove('hidden');
            summaryContent.innerHTML = `<div class="flex items-center gap-3 py-10 justify-center"><div class="w-4 h-4 bg-blue-600 animate-ping rounded-full"></div><span class="text-xs font-bold uppercase tracking-widest text-gray-400">Analyseren...</span></div>`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appConfig.apiKey}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            { role: "system", content: "Je bent een analytische assistent. Vat de tekst samen in 4-5 krachtige, feitelijke bullet points in het Nederlands. Geen inleiding." },
                            { role: "user", content: `Titel: ${i.title}\n\nTekst: ${i.fullText || i.description}` }
                        ]
                    })
                });
                const data = await response.json();
                const text = data.choices[0].message.content;
                summaryContent.innerHTML = `<h4 class="font-bold text-gray-900 mb-4">${i.title}</h4><div class="space-y-2">${text.split('\n').map(line => line.trim() ? `<p>${line}</p>` : '').join('')}</div>`;
            } catch (e) {
                summaryContent.innerHTML = `<p class="text-red-500">Fout bij genereren samenvatting.</p>`;
            }
        }

        function toggleVault(encoded) {
            const i = JSON.parse(decodeURIComponent(encoded));
            const idx = vaultItems.findIndex(v => v.id === i.id);
            if (idx > -1) vaultItems.splice(idx, 1);
            else vaultItems.push(i);
            localStorage.setItem(VAULT_KEY, JSON.stringify(vaultItems));
            updateVaultCount();
            filterAndRender();
        }

        function setTier(t) {
            activeTier = t;
            ['Alle', '1', '2', '3'].forEach(id => {
                const btn = document.getElementById(`btn-tier-${id}`);
                if(id === t) btn.className = "px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all bg-white shadow-sm border border-gray-200";
                else btn.className = "px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all text-gray-500 hover:text-gray-700";
            });
            filterAndRender();
        }

        function setViewMode(m) {
            viewMode = m;
            const liveBtn = document.getElementById('btn-mode-live');
            const vaultBtn = document.getElementById('btn-mode-vault');
            if (m === 'live') {
                liveBtn.className = "px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-white shadow-sm";
                vaultBtn.className = "px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all text-gray-500";
            } else {
                vaultBtn.className = "px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-white shadow-sm";
                liveBtn.className = "px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all text-gray-500";
            }
            filterAndRender();
        }

        function toggleConfigModal() {
            document.getElementById('config-modal').classList.toggle('hidden');
            document.getElementById('config-apikey').value = appConfig.apiKey;
        }

        function switchConfigTab(t) {
            document.getElementById('tab-content-sources').classList.toggle('hidden', t !== 'sources');
            document.getElementById('tab-content-ai').classList.toggle('hidden', t !== 'ai');
            document.getElementById('tab-btn-sources').className = t === 'sources' ? 'pb-2 tab-active text-sm' : 'pb-2 tab-inactive text-sm';
            document.getElementById('tab-btn-ai').className = t === 'ai' ? 'pb-2 tab-active text-sm' : 'pb-2 tab-inactive text-sm';
        }

        function updateVaultCount() { document.getElementById('vault-count').innerText = `${vaultItems.length} items in Vault`; }
        function closeAIModal() { document.getElementById('ai-modal').classList.add('hidden'); }

        // --- INIT ---
        document.getElementById('search-input').addEventListener('input', filterAndRender);
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        loadFeeds();
    </script>
</body>
</html>
